<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px; padding: 18px;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
    color: #eeeeff;
  }
  h2 { font-size: 13px; letter-spacing: 3px; color: #f5c842; margin-bottom: 16px; }
  label { font-size: 9px; color: #55556a; letter-spacing: 2px; display: block; margin-bottom: 6px; }
  input {
    width: 100%; background: #1a1a26; border: 1px solid #2a2a45; border-radius: 6px;
    color: #eeeeff; font-family: 'Courier New', monospace; font-size: 11px;
    padding: 9px 10px; outline: none; margin-bottom: 10px;
  }
  input:focus { border-color: #f5c842; }
  button {
    width: 100%; background: #f5c842; color: #000; border: none; border-radius: 6px;
    font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 2px;
    font-weight: bold; padding: 11px; cursor: pointer;
  }
  button:hover { opacity: 0.85; }
  #status {
    font-size: 11px; margin-top: 12px; padding: 10px;
    border-radius: 6px; background: #13131c; border: 1px solid #2a2a45;
    min-height: 40px; line-height: 1.6; word-break: break-all;
    color: #55556a;
  }
  .note { font-size: 9px; color: #2a2a45; margin-top: 12px; line-height: 1.8; }
  a { color: #f5c842; }
</style>
</head>
<body>
<h2>♠ BJ ADVISOR</h2>
<label>ANTHROPIC API KEY</label>
<input type="text" id="apiKey" placeholder="sk-ant-api03-...">
<button id="saveBtn">SAVE KEY</button>
<div id="status">Loading...</div>
<div class="note">
  Get key: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br>
  Stored locally in Chrome only.<br>
  On Bovada: click AUTO to scan every 2s.
</div>

<script>
  const keyEl  = document.getElementById('apiKey');
  const status = document.getElementById('status');

  function show(msg, color) {
    status.textContent = msg;
    status.style.color = color || '#eeeeff';
  }

  // Load existing key via message to background
  chrome.runtime.sendMessage({ type: 'GET_KEY' }, (res) => {
    if (chrome.runtime.lastError) {
      show('BG error: ' + chrome.runtime.lastError.message, '#ff2d55');
      return;
    }
    if (res && res.apiKey) {
      keyEl.value = res.apiKey;
      show('✓ Key loaded: ' + res.apiKey.slice(0,14) + '...', '#00e87a');
    } else {
      show('No key saved yet. Paste your key above.', '#55556a');
    }
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    const key = keyEl.value.trim();
    if (!key || key.length < 8) {
      show('Key is too short!', '#ff2d55');
      return;
    }
    show('Saving...', '#f5c842');
    chrome.runtime.sendMessage({ type: 'SET_KEY', key }, (res) => {
      if (chrome.runtime.lastError) {
        show('Error: ' + chrome.runtime.lastError.message, '#ff2d55');
        return;
      }
      if (res && res.ok) {
        show('✓ SAVED! Key: ' + key.slice(0,14) + '...\nNow go to Bovada → click AUTO.', '#00e87a');
      } else {
        show('✗ Save failed: ' + JSON.stringify(res), '#ff2d55');
      }
    });
  });
</script>
</body>
</html>
